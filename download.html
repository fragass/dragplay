<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script>
    if (!sessionStorage.getItem("token")) {
      window.location.href = "index.html";
    }
  </script>
  <link rel="icon" href="favicon.png" type="image/png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página Inicial - Workday</title>
  <meta name="theme-color" content="#0a0a0f" />

  <style>
    *{box-sizing:border-box}

    html,body{
      margin:0;
      width:100%;
      min-height:100%;
    }

    body{
      background:#0a0a0f;
      color:#e6e6e6;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;
    }

    .bg{
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at top, rgba(106,0,255,.12) 0%, rgba(106,0,255,.04) 20%, transparent 45%),
        #0a0a0f;
      pointer-events:none;
    }

    .shell{
      position:relative;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px;
    }

    .card{
      position:relative;
      width:100%;
      max-width:720px;
      background:#111116;
      border:1px solid rgba(255,255,255,.06);
      border-radius:14px;
      padding:54px 24px 24px;
      display:flex;
      flex-direction:column;
      gap:18px;
      box-shadow:0 12px 40px rgba(0,0,0,.35);
    }

    .back{
      position:absolute;
      top:16px;
      left:16px;
      font-size:14px;
      text-decoration:none;
      color:#b8b8b8;
      padding:6px 10px;
      border-radius:6px;
      transition:.15s;
    }

    .back:hover{
      color:#fff;
      background:rgba(255,255,255,.05);
    }

    #gamesContainer{
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .game{
      position:relative;
      display:flex;
      flex-direction:column;
      gap:12px;
      padding:14px;
      border:1px solid rgba(255,255,255,.06);
      border-radius:10px;
      background:rgba(255,255,255,.01);
    }

    .game-top{
      position:relative;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      padding-right:0;
    }

    .game-top-right{
      display:flex;
      align-items:center;
      gap:8px;
      flex-shrink:0;
    }

    .platform-badge{
      padding:4px 8px;
      border-radius:999px;
      font-size:11px;
      font-weight:600;
      letter-spacing:.4px;
      color:#d7d0ff;
      background:rgba(106,0,255,.14);
      border:1px solid rgba(106,0,255,.28);
      user-select:none;
      white-space:nowrap;
    }

    .download-counter{
      display:inline-flex;
      align-items:center;
      gap:5px;
      min-height:24px;
      padding:3px 8px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
      color:#bfbfbf;
      font-size:11px;
      white-space:nowrap;
      user-select:none;
    }

    .download-counter svg{
      width:12px;
      height:12px;
      fill:currentColor;
      opacity:.9;
      flex-shrink:0;
    }

    .game-title{
      margin:0;
      font-size:14px;
      font-weight:600;
      color:#f2f2f2;
      letter-spacing:.4px;
      display:flex;
      align-items:center;
      min-width:0;
    }

    .options{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .btn{
      min-width:140px;
      height:42px;
      padding:0 18px;
      border-radius:8px;
      border:none;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:#6a00ff;
      color:#fff;
      transition:.15s;
    }

    .btn:hover{
      background:#7c1cff;
    }

    .btn--ghost{
      background:transparent;
      color:#c4c4c4;
      border:1px solid rgba(255,255,255,.08);
    }

    .btn--ghost:hover{
      background:rgba(255,255,255,.04);
      color:#fff;
    }

    .btn--disabled{
      pointer-events:none;
      opacity:.45;
      cursor:not-allowed;
    }

    .meta{
      font-size:12px;
      color:#8b8b8b;
    }

    .status-dot{
      width:8px;
      height:8px;
      border-radius:50%;
      display:inline-block;
      margin-right:8px;
      animation:pulse 1.6s infinite;
      flex-shrink:0;
    }

    .status-online{
      background:#3cff5c;
      box-shadow:0 0 6px #3cff5c;
    }

    .status-offline{
      background:#ff4d4d;
      box-shadow:0 0 6px #ff4d4d;
    }

    .status-maintenance{
      background:#ffb347;
      box-shadow:0 0 6px #ffb347;
    }

    .loading,
    .error,
    .empty{
      padding:14px;
      border:1px solid rgba(255,255,255,.06);
      border-radius:10px;
      background:rgba(255,255,255,.01);
      font-size:13px;
      color:#8b8b8b;
    }

    .error{
      color:#ff9f9f;
    }

    @keyframes pulse{
      0%{
        transform:scale(1);
        opacity:1;
      }
      50%{
        transform:scale(1.35);
        opacity:.6;
      }
      100%{
        transform:scale(1);
        opacity:1;
      }
    }

    @media (max-width: 640px){
      .shell{
        padding:16px;
      }

      .card{
        padding:52px 16px 16px;
      }

      .options{
        flex-direction:column;
      }

      .btn{
        width:100%;
      }

      #gamesContainer{
        gap:12px;
      }

      .game-top{
        flex-direction:column;
        align-items:flex-start;
      }

      .game-top-right{
        width:100%;
        justify-content:flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <main class="shell">
    <section class="card">
      <a class="back" href="./reyalp.html">Voltar</a>

      <div id="gamesContainer">
        <div class="loading">Carregando jogos...</div>
      </div>
    </section>
  </main>

  <span style="position:fixed; bottom:10px; left:10px; opacity:.6; font-size:11px; z-index:999;">
    v0.9.0.2026.03.16
  </span>

  <script>
    const gamesContainer = document.getElementById("gamesContainer");

    function escapeHtml(text){
      return String(text || "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function getStatusClass(status){
      if(status === "offline") return "status-offline";
      if(status === "maintenance") return "status-maintenance";
      return "status-online";
    }

    function normalizePlatform(platform){
      const value = String(platform || "").trim().toLowerCase();

      if (value === "n64" || value === "nintendo 64") return "n64";
      return "psx";
    }

    function getSecondaryButtonLabel(platform){
      const normalized = normalizePlatform(platform);
      return normalized === "n64" ? "Download .z64" : "Download .cue";
    }

    function formatCount(value){
      const number = Number(value || 0);
      return Number.isFinite(number) ? number.toLocaleString("pt-BR") : "0";
    }

    function buildCounter(count){
      return `
        <span class="download-counter" title="Total de cliques em download">
          <svg viewBox="0 0 16 16" aria-hidden="true">
            <path d="M.5 9.9v3.6A1.5 1.5 0 0 0 2 15h12a1.5 1.5 0 0 0 1.5-1.5V9.9a.5.5 0 0 0-1 0v3.6a.5.5 0 0 1-.5.5H2a.5.5 0 0 1-.5-.5V9.9a.5.5 0 0 0-1 0z"/>
            <path d="M7.646 10.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 9.293V1.5a.5.5 0 0 0-1 0v7.793L5.354 7.146a.5.5 0 1 0-.708.708l3 3z"/>
          </svg>
          <span>${formatCount(count)}</span>
        </span>
      `;
    }

    function buildButton(url, text, extraClass = "", gameId = "", platform = "PS1", title = ""){
      if(!url){
        return `<span class="btn ${extraClass} btn--disabled">${text}</span>`;
      }

      const safePlatform = escapeHtml(platform);
      const safeTitle = escapeHtml(title);
      const safeGameId = escapeHtml(String(gameId || ""));

      return `<a class="btn ${extraClass}" href="${url}" data-game-id="${safeGameId}" data-platform="${safePlatform}" data-title="${safeTitle}">${text}</a>`;
    }

    async function registerClick(gameId){
      if (!gameId) return null;

      try{
        const response = await fetch("/api/game-click", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            game_id: Number(gameId)
          })
        });

        if (!response.ok) return null;

        const data = await response.json();
        if (!data?.success) return null;

        return Number(data.download_count || 0);
      }catch{
        return null;
      }
    }

    function bindDownloadLinks(){
      gamesContainer.querySelectorAll("a[data-game-id]").forEach(link => {
        link.addEventListener("click", async () => {
          const gameId = link.dataset.gameId;
          const platform = normalizePlatform(link.dataset.platform);
          const title = String(link.dataset.title || "").trim();

          sessionStorage.setItem("dragplay_last_platform", platform);
          sessionStorage.setItem("dragplay_last_title", title);
          sessionStorage.setItem("dragplay_flow_source", "downloads");

          const nextCount = await registerClick(gameId);
          if (nextCount !== null) {
            const gameCard = link.closest(".game");
            const counterValue = gameCard?.querySelector("[data-counter-value]");
            if (counterValue) {
              counterValue.textContent = formatCount(nextCount);
            }
          }
        });
      });
    }

    function renderGames(games){
      if(!games.length){
        gamesContainer.innerHTML = `<div class="empty">Nenhum jogo disponível.</div>`;
        return;
      }

      gamesContainer.innerHTML = games.map(game=>{
        const statusClass = getStatusClass(game.status);
        const platform = escapeHtml(game.platform || "PS1");
        const secondaryLabel = getSecondaryButtonLabel(game.platform);

        return `
          <div class="game">
            <div class="game-top">
              <h2 class="game-title">
                <span class="status-dot ${statusClass}"></span>
                ${escapeHtml(game.title)}
              </h2>

              <div class="game-top-right">
                <span class="platform-badge">${platform}</span>

                <span class="download-counter" title="Total de cliques em download">
                  <svg viewBox="0 0 16 16" aria-hidden="true">
                    <path d="M.5 9.9v3.6A1.5 1.5 0 0 0 2 15h12a1.5 1.5 0 0 0 1.5-1.5V9.9a.5.5 0 0 0-1 0v3.6a.5.5 0 0 1-.5.5H2a.5.5 0 0 1-.5-.5V9.9a.5.5 0 0 0-1 0z"/>
                    <path d="M7.646 10.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 9.293V1.5a.5.5 0 0 0-1 0v7.793L5.354 7.146a.5.5 0 1 0-.708.708l3 3z"/>
                  </svg>
                  <span data-counter-value>${formatCount(game.download_count)}</span>
                </span>
              </div>
            </div>

            <div class="options">
              ${buildButton(game.zip_url, "Download .zip", "", game.id, platform, game.title)}
              ${buildButton(game.cue_url, secondaryLabel, "btn--ghost", game.id, platform, game.title)}
            </div>

            <div class="meta">Google Drive</div>
          </div>
        `;
      }).join("");

      bindDownloadLinks();
    }

    async function loadGames(){
      try{
        const res = await fetch("/api/games");

        if(!res.ok){
          throw new Error("API error");
        }

        const data = await res.json();
        renderGames(data);
      }catch(err){
        gamesContainer.innerHTML = `<div class="error">Erro ao carregar jogos</div>`;
      }
    }

    loadGames();
  </script>
</body>
</html>
