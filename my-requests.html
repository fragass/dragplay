<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script>
    if (!sessionStorage.getItem("token")) {
      window.location.href = "index.html";
    }
  </script>
  <link rel="icon" href="favicon.png" type="image/png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meus Tickets - Workday</title>
  <meta name="theme-color" content="#0a0a0f" />

  <style>
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;min-height:100%}
    body{
      background:#0a0a0f;
      color:#e6e6e6;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;
    }
    .bg{
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at top, rgba(106,0,255,.12) 0%, rgba(106,0,255,.04) 20%, transparent 45%),
        #0a0a0f;
      pointer-events:none;
    }
    .shell{
      position:relative;
      min-height:100vh;
      display:flex;
      justify-content:center;
      padding:28px;
    }
    .card{
      position:relative;
      width:100%;
      max-width:1000px;
      background:#111116;
      border:1px solid rgba(255,255,255,.06);
      border-radius:14px;
      padding:54px 24px 24px;
      display:flex;
      flex-direction:column;
      gap:18px;
      box-shadow:0 12px 40px rgba(0,0,0,.35);
    }
    .back{
      position:absolute;
      top:16px;
      left:16px;
      font-size:14px;
      text-decoration:none;
      color:#b8b8b8;
      padding:6px 10px;
      border-radius:6px;
      transition:.15s;
    }
    .back:hover{
      color:#fff;
      background:rgba(255,255,255,.05);
    }
    .title{
      margin:0;
      font-size:20px;
      font-weight:600;
      color:#f2f2f2;
    }
    .subtitle{
      margin:0;
      font-size:13px;
      color:#8d8d8d;
    }
    .loading,.error,.empty{
      padding:14px;
      border:1px solid rgba(255,255,255,.06);
      border-radius:10px;
      background:rgba(255,255,255,.01);
      font-size:13px;
      color:#8b8b8b;
    }
    .error{color:#ff9f9f}
    .requests{
      display:flex;
      flex-direction:column;
      gap:14px;
    }
    .request-card{
      border:1px solid rgba(255,255,255,.06);
      border-radius:12px;
      background:rgba(255,255,255,.01);
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .request-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
    .request-game{
      margin:0;
      font-size:15px;
      font-weight:600;
      color:#f2f2f2;
    }
    .request-meta{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:24px;
      padding:4px 9px;
      border-radius:999px;
      font-size:11px;
      font-weight:600;
      letter-spacing:.3px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
      color:#d8d8d8;
    }
    .badge--psx{
      color:#d7d0ff;
      background:rgba(106,0,255,.14);
      border-color:rgba(106,0,255,.28);
    }
    .badge--n64{
      color:#bfe3ff;
      background:rgba(0,153,255,.12);
      border-color:rgba(0,153,255,.22);
    }
    .badge--pending{
      color:#ffd899;
      background:rgba(255,179,71,.12);
      border-color:rgba(255,179,71,.22);
    }
    .badge--approved{
      color:#baf7c7;
      background:rgba(60,255,92,.10);
      border-color:rgba(60,255,92,.20);
    }
    .badge--rejected{
      color:#ffb8b8;
      background:rgba(255,77,77,.10);
      border-color:rgba(255,77,77,.20);
    }
    .badge--pendinginfo{
      color:#ffe1ab;
      background:rgba(255,179,71,.10);
      border-color:rgba(255,179,71,.20);
    }
    .request-info{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
    }
    .request-block{
      display:flex;
      flex-direction:column;
      gap:4px;
      min-width:0;
    }
    .request-label{
      font-size:11px;
      color:#8d8d8d;
      text-transform:uppercase;
      letter-spacing:.5px;
    }
    .request-value{
      font-size:13px;
      color:#e6e6e6;
      word-break:break-word;
      line-height:1.5;
    }
    .followup-box{
      border-top:1px solid rgba(255,255,255,.06);
      padding-top:12px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .field{
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .field label{
      font-size:12px;
      color:#b8b8b8;
    }
    .field textarea{
      width:100%;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.08);
      background:#0d0d12;
      color:#e6e6e6;
      padding:12px 14px;
      outline:none;
      transition:.15s;
      height:90px;
      resize:none;
    }
    .field textarea:focus{
      border-color:rgba(106,0,255,.65);
      background:#0f0f16;
    }
    .followup-actions{
      display:flex;
      justify-content:flex-end;
    }
    .btn{
      height:40px;
      padding:0 16px;
      border-radius:8px;
      border:none;
      cursor:pointer;
      transition:.15s;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:14px;
    }
    .btn--primary{
      background:#6a00ff;
      color:#fff;
    }
    .btn--primary:hover{
      background:#7c1cff;
    }
    .toast-wrap{
      position:fixed;
      right:16px;
      bottom:16px;
      z-index:10000;
      display:flex;
      flex-direction:column;
      gap:10px;
      pointer-events:none;
    }
    .toast{
      min-width:280px;
      max-width:420px;
      padding:14px 16px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.08);
      background:#111116;
      color:#e6e6e6;
      box-shadow:0 18px 40px rgba(0,0,0,.35);
    }
    .toast--success{border-color:rgba(60,255,92,.18)}
    .toast--error{border-color:rgba(255,77,77,.18)}
    .toast-title{display:block;font-size:13px;font-weight:600;margin-bottom:4px}
    .toast-text{display:block;font-size:12px;line-height:1.5;color:#b8b8b8}
    @media (max-width:700px){
      .shell{padding:16px}
      .card{padding:52px 16px 16px}
      .request-info{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <main class="shell">
    <section class="card">
      <a class="back" href="./reyalp.html">Voltar</a>
      <h1 class="title">Meus Tickets</h1>
      <p class="subtitle">Acompanhe o status das suas solicitações.</p>
      <div id="contentArea">
        <div class="loading">Carregando seus tickets...</div>
      </div>
    </section>
  </main>

  <div class="toast-wrap" id="toastWrap"></div>

  <script>
    const contentArea = document.getElementById("contentArea");
    const toastWrap = document.getElementById("toastWrap");
    const loggedUser = sessionStorage.getItem("loggedUser") || "";

    function escapeHtml(text){
      return String(text || "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function showToast(type, title, text) {
      const toast = document.createElement("div");
      toast.className = `toast toast--${type}`;
      toast.innerHTML = `
        <span class="toast-title">${title}</span>
        <span class="toast-text">${text}</span>
      `;
      toastWrap.appendChild(toast);
      setTimeout(() => toast.remove(), 3200);
    }

    function formatCore(core){
      return String(core).toLowerCase() === "n64" ? "Nintendo64" : "Playstation";
    }

    function formatDate(date){
      try{
        return new Date(date).toLocaleString("pt-BR");
      }catch{
        return date || "-";
      }
    }

    function formatStatus(status){
      const value = String(status || "pending").toLowerCase();
      if (value === "approved") return "Aprovado";
      if (value === "rejected") return "Reprovado";
      if (value === "pending_info") return "Análise pendente";
      return "Pendente";
    }

    function statusBadgeClass(status){
      const value = String(status || "pending").toLowerCase();
      if (value === "approved") return "badge--approved";
      if (value === "rejected") return "badge--rejected";
      if (value === "pending_info") return "badge--pendinginfo";
      return "badge--pending";
    }

    async function markRepliesAsSeen() {
      if (!loggedUser) return;

      try {
        await fetch("/api/my-requests-mark-seen", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            username: loggedUser
          })
        });
      } catch {}
    }

    async function loadMyTickets(){
      if (!loggedUser) {
        contentArea.innerHTML = `<div class="error">Usuário não encontrado na sessão.</div>`;
        return;
      }

      try{
        await markRepliesAsSeen();

        const response = await fetch(`/api/my-requests?username=${encodeURIComponent(loggedUser)}`);
        const data = await response.json();

        if (!response.ok || !data.success) {
          throw new Error(data.message || "Erro ao carregar tickets.");
        }

        const requests = Array.isArray(data.requests) ? data.requests : [];

        if (!requests.length) {
          contentArea.innerHTML = `<div class="empty">Você ainda não enviou nenhuma solicitação.</div>`;
          return;
        }

        contentArea.innerHTML = `
          <div class="requests">
            ${requests.map(item => `
              <div class="request-card" data-ticket-id="${item.id}">
                <div class="request-top">
                  <h2 class="request-game">${escapeHtml(item.game_title)}</h2>

                  <div class="request-meta">
                    <span class="badge ${String(item.core).toLowerCase() === "n64" ? "badge--n64" : "badge--psx"}">
                      ${escapeHtml(formatCore(item.core))}
                    </span>

                    <span class="badge ${statusBadgeClass(item.status)}">
                      ${escapeHtml(formatStatus(item.status))}
                    </span>
                  </div>
                </div>

                <div class="request-info">
                  <div class="request-block">
                    <span class="request-label">Enviado em</span>
                    <span class="request-value">${escapeHtml(formatDate(item.created_at))}</span>
                  </div>

                  <div class="request-block">
                    <span class="request-label">Respondido em</span>
                    <span class="request-value">${escapeHtml(item.reviewed_at ? formatDate(item.reviewed_at) : "Ainda não respondido")}</span>
                  </div>

                  <div class="request-block" style="grid-column:1 / -1;">
                    <span class="request-label">Sua observação inicial</span>
                    <span class="request-value">${escapeHtml(item.notes || "Sem observações")}</span>
                  </div>

                  <div class="request-block" style="grid-column:1 / -1;">
                    <span class="request-label">Seu último complemento</span>
                    <span class="request-value">${escapeHtml(item.user_followup || "Nenhum complemento enviado")}</span>
                  </div>

                  <div class="request-block" style="grid-column:1 / -1;">
                    <span class="request-label">Resposta do admin</span>
                    <span class="request-value">${escapeHtml(item.admin_reply || "Sem resposta ainda")}</span>
                  </div>
                </div>

                ${item.status === "pending_info" ? `
                  <div class="followup-box">
                    <div class="field">
                      <label>Enviar complemento</label>
                      <textarea class="followup-text" maxlength="1000" placeholder="Digite aqui as informações adicionais solicitadas pelo admin..."></textarea>
                    </div>

                    <div class="followup-actions">
                      <button type="button" class="btn btn--primary followup-send">Reenviar ticket</button>
                    </div>
                  </div>
                ` : ""}
              </div>
            `).join("")}
          </div>
        `;

        bindFollowupActions();
      }catch(error){
        contentArea.innerHTML = `<div class="error">${escapeHtml(error.message || "Erro ao carregar tickets.")}</div>`;
      }
    }

    function bindFollowupActions() {
      document.querySelectorAll(".followup-send").forEach(button => {
        button.addEventListener("click", async () => {
          const card = button.closest("[data-ticket-id]");
          const requestId = Number(card.dataset.ticketId);
          const followupText = card.querySelector(".followup-text")?.value.trim() || "";

          if (!followupText) {
            showToast("error", "Complemento não enviado", "Digite as informações solicitadas.");
            return;
          }

          button.disabled = true;
          button.textContent = "Enviando...";

          try {
            const response = await fetch("/api/my-request-reply", {
              method: "POST",
              headers: {
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                username: loggedUser,
                request_id: requestId,
                user_followup: followupText
              })
            });

            const data = await response.json();

            if (!response.ok || !data.success) {
              throw new Error(data.message || "Erro ao reenviar ticket.");
            }

            showToast("success", "Complemento enviado", "Seu ticket voltou para análise do admin.");
            await loadMyTickets();
          } catch (error) {
            showToast("error", "Erro ao enviar", error.message || "Não foi possível reenviar o ticket.");
          } finally {
            button.disabled = false;
            button.textContent = "Reenviar ticket";
          }
        });
      });
    }

    loadMyTickets();
  </script>
</body>
</html>
